name: Test Proofs Action

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run Proof Tests
        run: npm test
      - name: Run Sigma Stability Check
        run: |
          if [ -f sigma/sigma_monitor.py ]; then
            python3 sigma/sigma_monitor.py
          fi
      - name: Run Merkle Integrity Check
        run: |
          if [ -f scripts/verify_merkle.py ]; then
            python3 scripts/verify_merkle.py
          fi
